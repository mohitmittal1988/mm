name: CI — PR Checks

on:
  pull_request:
    branches: ["master"]

jobs:
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install html-proofer
        run: gem install html-proofer

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate HTML & check internal links
        run: |
          htmlproofer _site \
            --disable-external \
            --ignore-missing-alt \
            --ignore-urls "/^#/"
