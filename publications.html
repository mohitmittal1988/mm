---
layout: default
title: Publications — Mohit Mittal
nav_active: publications
---
<style>
/* CONTROLS */
.controls-bar { padding: 40px 60px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 380px; }
.search-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--white); padding: 12px 18px; font-family: 'DM Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.3s; }
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--white-dim); }
.filter-btns { display: flex; gap: 0; }
.filter-btn { padding: 12px 22px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--white-dim); background: var(--bg2); border: 1px solid var(--border); border-right: none; cursor: none; transition: color 0.3s, background 0.3s; }
.filter-btn:last-child { border-right: 1px solid var(--border); }
.filter-btn:hover { color: var(--gold); }
.filter-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }

/* PUBLICATIONS */
.pubs-section { padding: 60px 60px 100px; background: var(--bg); }
.pub-item { display: grid; grid-template-columns: 80px 1fr; gap: 32px; padding: 36px 0; border-bottom: 1px solid var(--white-faint); align-items: start; opacity: 0; transform: translateY(20px); transition: padding-left 0.3s, opacity 0.5s, transform 0.5s; }
.pub-item:hover { padding-left: 12px; }
.pub-item.fade-in { opacity: 1; transform: translateY(0); }
.pub-year { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--gold); opacity: 0.5; line-height: 1; padding-top: 4px; }
.pub-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 500; color: var(--white); margin-bottom: 8px; line-height: 1.4; }
.pub-authors { font-size: 12px; color: var(--white-dim); margin-bottom: 6px; line-height: 1.6; }
.pub-authors strong { color: var(--gold); font-weight: 400; }
.pub-venue { font-size: 11px; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
.pub-badges { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.badge { padding: 3px 12px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid; }
.badge-gold { border-color: var(--gold); color: var(--gold); }
.badge-blue { border-color: var(--accent); color: var(--accent); }
.badge-green { border-color: #5bc98e; color: #5bc98e; }
.no-results { text-align: center; padding: 80px 0; color: var(--white-dim); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }

/* SCROLL TOP */
.scroll-top { position: fixed; bottom: 32px; right: 32px; z-index: 500; width: 48px; height: 48px; background: var(--gold); color: var(--bg); border: none; display: flex; align-items: center; justify-content: center; cursor: none; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s, transform 0.2s; font-size: 18px; }
.scroll-top.show { opacity: 1; visibility: visible; }
.scroll-top:hover { transform: translateY(-3px); background: var(--gold2); }

@media (max-width: 768px) {
  .controls-bar { padding: 24px; flex-direction: column; align-items: stretch; }
  .search-wrap { max-width: 100%; }
  .filter-btns { flex-wrap: wrap; }
  .pubs-section { padding: 40px 24px 80px; }
  .pub-item { grid-template-columns: 60px 1fr; gap: 16px; }
}
</style>

<div class="page-hero">
  <div>
    <div class="page-hero-tag">Academic Work</div>
    <h1 class="page-hero-title">Selected<br/><em>Publications</em></h1>
    <p class="page-hero-sub">Peer-reviewed research published in leading journals and international conferences. Spanning AI, signal processing, and applied sciences.</p>
  </div>
</div>

<div class="controls-bar">
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search publications..."/>
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="article">Journals</button>
    <button class="filter-btn" data-filter="inproceedings">Conferences</button>
    <button class="filter-btn" data-filter="misc">Books</button>
  </div>
</div>

<section class="pubs-section">
  <div id="pub-container"></div>
  <p id="no-results" class="no-results" style="display:none;">No publications found.</p>
</section>

<button class="scroll-top" id="scrollTop">↑</button>

<script>
  const scrollTopBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('show', window.scrollY > 300));
  scrollTopBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

  function parseBibtex(content) {
    const pubs = [];
    const entries = content.split('@').filter(e => e.trim());
    entries.forEach(entry => {
      const lines = entry.split(/[\r\n]+/).map(l => l.trim()).filter(l => l.length);
      const typeAndId = lines[0].split('{');
      const type = typeAndId[0].trim().toLowerCase();
      const pub = {type, url: '#'};
      lines.forEach(line => {
        const m = line.match(/^(\w+)\s*=\s*\{\s*(.*)\s*\},?$/);
        if (m) { const key = m[1].toLowerCase(); let val = m[2].trim().replace(/[\{\}]/g, '').replace(/\\&/, '&'); pub[key] = val; }
      });
      if (pub.title) pubs.push(pub);
    });
    return pubs;
  }

  function typeLabel(t) {
    if (t === 'article') return ['Journal', 'badge-blue'];
    if (t === 'inproceedings') return ['Conference', 'badge-gold'];
    if (t === 'misc') return ['Book', 'badge-green'];
    return [t, 'badge-blue'];
  }

  function renderPubs(pubs) {
    const container = document.getElementById('pub-container');
    const noResults = document.getElementById('no-results');
    container.innerHTML = '';
    if (!pubs.length) { noResults.style.display = 'block'; return; }
    noResults.style.display = 'none';
    pubs.forEach((pub, i) => {
      const authors = pub.author ? pub.author.split(' and ').join(', ') : 'N/A';
      const venue = pub.journal || pub.booktitle || pub.publisher || 'N/A';
      const [label, cls] = typeLabel(pub.type);
      const item = document.createElement('div');
      item.className = 'pub-item';
      item.setAttribute('data-type', pub.type);
      item.innerHTML = `
        <div class="pub-year">${pub.year || '—'}</div>
        <div class="pub-content">
          <div class="pub-title">${pub.title || 'Untitled'}</div>
          <div class="pub-authors">${authors}</div>
          <div class="pub-venue">${venue}</div>
          <div class="pub-badges"><span class="badge ${cls}">${label}</span></div>
        </div>`;
      container.appendChild(item);
      setTimeout(() => item.classList.add('fade-in'), i * 60);
    });
  }

  let allPubs = [];
  let activeFilter = 'all';

  function updateDisplay() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allPubs.filter(p => {
      const text = JSON.stringify(p).toLowerCase();
      return text.includes(term) && (activeFilter === 'all' || p.type === activeFilter);
    });
    renderPubs(filtered);
  }

  document.getElementById('searchInput').addEventListener('keyup', updateDisplay);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      updateDisplay();
    });
  });

  async function init() {
    try {
      const res = await fetch('mm.bib');
      const text = await res.text();
      allPubs = parseBibtex(text);
    } catch(e) {
      allPubs = [
        {type:'article',title:'Analysis on road crash severity of drivers using machine learning techniques',author:'Mittal, Mohit and Gupta, Swadha and Chauhan, Shaifali and Saraswat, Lalit Kumar',journal:'International Journal of Engineering Systems Modelling and Simulation',year:'2022'},
        {type:'article',title:'Machine learning techniques for energy efficiency and anomaly detection in hybrid wireless sensor networks',author:'Mittal, Mohit and De Prado, Rocio Perez and Kawai, Yukiko and Nakajima, Shinsuke and Munoz-Exposito, Jose E',journal:'Energies',year:'2021'},
        {type:'article',title:'The use of ensemble models for multiple class and binary class classification for improving intrusion detection systems',author:'Iwendi, Celestine and Khan, Suleman and Anajemba, Joseph Henry and Mittal, Mohit and Alenezi, Mamdouh and Alazab, Mamoun',journal:'Sensors',year:'2020'},
        {type:'article',title:'OPTIMAL COOPERATIVE OFFLOADING SCHEME FOR ENERGY EFFICIENT MULTI-ACCESS EDGE COMPUTATION',author:'ANAJEMBA, JOSEPH HENRY and YUE, TANG and IWENDI, CELESTINE and ALENEZI, MAMDOUH and MITTAL, MOHIT',journal:'IEEE ACCESS',year:'2020'},
        {type:'article',title:'Analysis of security and energy efficiency for shortest route discovery in low-energy adaptive clustering hierarchy protocol using Levenberg-Marquardt neural network and gated recurrent unit for intrusion detection system',author:'Mittal, Mohit and others',journal:'Transactions on Emerging Telecommunications Technologies',year:'2020'},
        {type:'article',title:'Analysis of Energy Efficiency Based on Shortest Route Discovery in Wireless Sensor Network',author:'mittal, mohit',journal:'International Journal of Advanced Intelligence Paradigms',year:'2022'},
      ];
    }
    renderPubs(allPubs);
  }
  init();
</script>
